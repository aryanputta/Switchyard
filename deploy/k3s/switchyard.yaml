# Switchyard on k3s. k3s is a lightweight CNCF-conformant Kubernetes that runs
# the full serving path on a single node or a small cluster, which is enough to
# demonstrate real orchestration: a horizontally scalable API, a stateful
# OpenSearch, cache and log backends, and latency-driven autoscaling.
#
#   k3d cluster create switchyard --agents 1
#   kubectl apply -f deploy/k3s/switchyard.yaml
#
apiVersion: v1
kind: Namespace
metadata:
  name: switchyard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: switchyard
spec:
  replicas: 2
  selector:
    matchLabels: { app: switchyard-api }
  template:
    metadata:
      labels: { app: switchyard-api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api
          image: switchyard/api:latest
          ports:
            - containerPort: 8080
          env:
            - name: OPENSEARCH_URL
              value: http://opensearch:9200
            - name: REDIS_URL
              value: redis://redis:6379
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests: { cpu: "100m", memory: "128Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: switchyard
spec:
  selector: { app: switchyard-api }
  ports:
    - port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: switchyard
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: opensearch
  namespace: switchyard
spec:
  serviceName: opensearch
  replicas: 1
  selector:
    matchLabels: { app: opensearch }
  template:
    metadata:
      labels: { app: opensearch }
    spec:
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          env:
            - name: discovery.type
              value: single-node
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          ports:
            - containerPort: 9200
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: opensearch
  namespace: switchyard
spec:
  selector: { app: opensearch }
  ports:
    - port: 9200
      targetPort: 9200
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: switchyard
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: switchyard
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
