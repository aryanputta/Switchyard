# Local bring-up of the Switchyard serving stack. This is the industry-standard
# substrate the system targets: OpenSearch for BM25 + HNSW dense retrieval,
# Redis for result caching, Postgres for query and experiment logs, Prometheus
# and Grafana for monitoring. The Go API loads the frozen router model.
#
#   docker compose up --build
#
services:
  api:
    build:
      context: .
      dockerfile: serving/Dockerfile
    ports:
      - "8080:8080"
    environment:
      OPENSEARCH_URL: http://opensearch:9200
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgres://switchyard:switchyard@postgres:5432/switchyard
    depends_on:
      - opensearch
      - redis
      - postgres

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: switchyard
      POSTGRES_PASSWORD: switchyard
      POSTGRES_DB: switchyard
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    depends_on:
      - prometheus

volumes:
  opensearch-data:
  postgres-data:
